<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>みんQ</title>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FWPQD3EYNB"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-FWPQD3EYNB');
  </script>

  <link rel="stylesheet" href="style.css">

  <meta name="google-site-verification" content="xPNvunaeRAdX17J3P3BY6rnzkZHc1Y2qnFwgOFUm-Sg" />
</head>

<body>

  <header>
    <div class="logo-container">
      <div class="logo" onclick="location.href='index.html'" role="button" tabindex="0">
        みんQ
      </div>
      <button class="topBtn" type="button">TOP</button>
    </div>

    <div class="nav">
     <input id="searchInput" placeholder="検索">

     <button onclick="searchQuestions()" type="button">
       検索
     </button>

     <button onclick="location.href='create.html'" type="button">
       作成
     </button>
   </div>
  </header>

  <div class="categoryBox">
    <div class="categoryHeader">
      <span class="categoryTitle">カテゴリ</span>
      <div id="tagArea"></div>
    </div>
  </div>

  <main class="layout">
    <div class="sortMenu">
      <span id="sort-new" class="active" onclick="changeSort('new')">新着順</span>
      /
      <span id="sort-view" onclick="changeSort('view')">閲覧順</span>
      /
      <span id="sort-vote" onclick="changeSort('vote')">回答順</span>
    </div>

    <div id="questions"></div>
  </main>

  <nav class="pager" aria-label="ページ移動">
    <button id="prevBtn" onclick="prevPage()" type="button">前へ</button>
    <span id="pageText"></span>
    <button id="nextBtn" onclick="nextPage()" type="button">次へ</button>
  </nav>

  <script src="app.js"></script>

</body>
</html>
