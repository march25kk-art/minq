  <title>みんQ - みんなでつくるアンケートコミュニティ</title>
  <meta name="theme-color" content="#159855">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="みんQ">

  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="site-logo" href="/" aria-label="みんQ ホーム"><span>みん</span><b>Q</b></a>

      <div class="header-actions">
        <label class="search-box" aria-label="キーワードで検索">
          <input id="searchInput" type="search" placeholder="キーワードで検索" onkeydown="if(event.key==='Enter') searchQuestions()">
          <button type="button" onclick="searchQuestions()" aria-label="検索">⌕</button>
        </label>
        <button class="primary-btn header-create" type="button" onclick="location.href='create.html'">
          <span>＋</span>質問を作成する
        </button>
      </div>
    </div>
  </header>

  <main>
    <section class="hero-section">
      <div class="hero-copy">
        <h1>みんなの意見で、毎日がもっと<span>おもしろくなる。</span></h1>
        <p>みんQは、気になることを質問したり、みんなの意見をシェアできる場所です。</p>
        <div class="trust-points"><span>✓ 登録不要</span><span>✓ 完全無料</span></div>
        <button class="primary-btn hero-btn" type="button" onclick="location.href='create.html'">
          質問を作成してみる <span>＋</span>
        </button>
        <button id="installAppBtn" class="install-app-btn" type="button" onclick="installApp()" hidden>
          <span aria-hidden="true"></span> ホーム画面に追加
        </button>
      </div>

    </section>

    <section class="category-section">
      <div class="section-head">
        <h2>カテゴリ</h2>
        <button id="toggleTagsBtn" class="text-btn" type="button" onclick="toggleAllTags()">もっと見る ›</button>
      </div>
      <div id="tagArea" class="category-row"></div>
    </section>

    <section class="content-grid">
      <div class="main-column">
        <div class="sortMenu">
          <button id="sort-update" class="active" type="button" onclick="changeSort('update')">おすすめ</button>
          <button id="sort-new" type="button" onclick="changeSort('new')">新着順 <span>NEW</span></button>
          <button id="sort-vote" type="button" onclick="changeSort('vote')">回答順</button>
          <button id="sort-view" type="button" onclick="changeSort('view')">人気順</button>
        </div>
        <div id="questions" class="question-list">
          <div class="loading-state">アンケートを読み込み中...</div>
        </div>
        <nav class="pager" aria-label="ページ移動">
          <button id="prevBtn" onclick="prevPage()" type="button" disabled>前へ</button>
          <span id="pageText">1 / 1 ページ</span>
          <button id="nextBtn" onclick="nextPage()" type="button" disabled>次へ</button>
        </nav>
      </div>

      <aside class="sidebar">
        <section class="side-card ranking-card">
          <h2>⌁ いま人気の質問</h2>
          <div id="popularQuestions" class="ranking-list"></div>
        </section>
        <section class="side-card create-nudge">
          <h2>あなたの気になること、<br>みんなに聞いてみよう!</h2>
          <p>質問を作成すると、みんなの意見が集まります。</p>
          <button class="primary-btn" type="button" onclick="location.href='create.html'">＋ 質問を作成する</button>
        </section>
        <section class="side-card about-card">
          <h2>みんQについて</h2>
          <p>みんQは、誰でも気軽に質問し、みんなで答えあえるアンケートコミュニティです。</p>
          <a href="about.html">もっと詳しく ›</a>
        </section>
      </aside>
    </section>
  </main>

  <footer class="site-footer">
    <nav>
      <a href="terms.html">利用規約</a>
      <a href="privacy.html">プライバシーポリシー</a>
      <a href="operator.html">運営者情報</a>
      <a href="contact.html">お問い合わせ</a>
    </nav>

  </footer>
