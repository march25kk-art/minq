<!DOCTYPE html>
<html lang="ja">
<head>
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="icon" href="/apple-touch-icon.png">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>みんQ - みんなのアンケートコミュニティ</title>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FWPQD3EYNB"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-FWPQD3EYNB');
  </script>

  <link rel="stylesheet" href="style.css">

  <meta name="google-site-verification" content="xPNvunaeRAdX17J3P3BY6rnzkZHc1Y2qnFwgOFUm-Sg" />
</head>

<body>

  <header>
    <div class="logo-container">
      <a class="logo" href="index.html" style="text-decoration: none; color: inherit;">
        みんQ
      </a>
      <button class="topBtn" type="button" onclick="location.href='index.html'">TOP</button>
    </div>

    <div class="nav">
      <input id="searchInput" placeholder="検索" onkeydown="if(event.key==='Enter') searchQuestions()">

      <button onclick="searchQuestions()" type="button">
        検索
      </button>

      <button onclick="location.href='create.html'" type="button">
        作成
      </button>
    </div>
  </header>

  <div class="categoryBox">
    <div class="categoryHeader">
      <span class="categoryTitle">カテゴリ</span>
      <div id="tagArea"></div>
    </div>
  </div>

  <main class="layout">
    <div class="sortMenu">
      <span id="sort-new" class="active" onclick="changeSort('new')">新着順</span>
      /
      <span id="sort-view" onclick="changeSort('view')">閲覧順</span>
      /
      <span id="sort-vote" onclick="changeSort('vote')">回答順</span>
    </div>

    <div id="questions">
      <div style="text-align: center; padding: 40px; color: #666; font-size: 14px;">
        アンケートを読み込み中...
      </div>
    </div>
  </main>

  <nav class="pager" aria-label="ページ移動">
    <button id="prevBtn" onclick="prevPage()" type="button" disabled>前へ</button>
    <span id="pageText">1 / 1 ページ</span>
    <button id="nextBtn" onclick="nextPage()" type="button" disabled>次へ</button>
  </nav>

  <script src="app.js"></script>

</body>
</html>
