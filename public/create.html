<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>質問を作成 - みんQ</title>
  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
</head>
<body>
  <header>
    <div class="logo-container">
      <a class="site-logo" href="/" aria-label="みんQ ホーム"><span>みん</span><b>Q</b></a>
      <button class="topBtn" type="button" onclick="location.href='/'">⌂</button>
    </div>
  </header>

  <main class="createContainer">
    <form class="createCard" onsubmit="return false;">
      <h1 class="createTitle">質問を作成する</h1>
      <input id="title" placeholder="タイトル（必須）">
      <textarea id="description" placeholder="説明（任意）"></textarea>
      <select id="tags"></select>
      <div id="options"></div>
      <button type="button" class="subBtn" onclick="addOption()">選択肢を追加</button>
      <button type="button" class="submitBtn" onclick="postQuestion()">アンケートを投稿する</button>
    </form>
  </main>
</body>
</html>
