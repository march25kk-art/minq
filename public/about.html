      <h1>みんQについて</h1>
      <p>みんQは、日常のちょっとした疑問をアンケートにして、みんなの考えを気軽に集められるコミュニティです。</p>
      <p>ニュース、仕事、恋愛、食べ物、趣味など、テーマは自由です。正解を決める場所ではなく、いろいろな意見を見比べるための場所として運営しています。</p>
      <h2>できること</h2>
      <ul>
        <li>気になる質問を作成できます。</li>
        <li>ほかの人の質問に投票できます。</li>
        <li>回答結果を全体・性別・年代別に確認できます。</li>
      </ul>
    </article>
