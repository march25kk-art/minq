<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FWPQD3EYNB"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-FWPQD3EYNB');
  </script>
  <title>お問い合わせ - みんQ</title>
  <link rel="stylesheet" href="style.css?v=20">
  <script src="contact.js?v=1" defer></script>
</head>
<body>
  <header>
    <div class="logo-container">
      <a class="site-logo" href="/" aria-label="みんQ ホーム"><span>みん</span><b>Q</b></a>
      <a class="home-link" href="/"><span>⌂</span>ホーム</a>
    </div>
  </header>
  <main class="staticPage">
    <article class="staticCard">
      <h1>お問い合わせ</h1>
      <p>不具合報告、削除依頼、その他のご連絡はこちらからお願いします。</p>
      <form id="contactForm" class="contactForm">
        <label class="contact-field">お名前
          <input type="text" name="name" maxlength="80" autocomplete="name" required>
        </label>
        <label class="contact-field">メールアドレス
          <input type="email" name="email" maxlength="254" autocomplete="email" required>
        </label>
        <label class="contact-field">お問い合わせ内容
          <textarea name="message" minlength="10" maxlength="4000" required></textarea>
        </label>
        <label class="contact-honeypot" aria-hidden="true">ウェブサイト
          <input type="text" name="website" tabindex="-1" autocomplete="off">
        </label>
        <button id="contactSubmit" class="submitBtn" type="submit">送信する</button>
        <p id="contactStatus" class="contact-status" role="status" aria-live="polite"></p>
      </form>
    </article>
  </main>
  <footer class="site-footer">
    <nav>
      <a href="terms.html">利用規約</a>
      <a href="privacy.html">プライバシーポリシー</a>
      <a href="operator.html">運営者情報</a>
      <a href="contact.html" aria-current="page">お問い合わせ</a>
    </nav>
    <span>© 2026 みんQ</span>
  </footer>
</body>
</html>
