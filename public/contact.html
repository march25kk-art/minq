<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ - みんQ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo-container">
      <a class="site-logo" href="/" aria-label="みんQ ホーム"><span>みん</span><b>Q</b></a>
      <a class="home-link" href="/"><span>⌂</span>ホーム</a>
    </div>
  </header>
  <main class="staticPage">
    <article class="staticCard">
      <h1>お問い合わせ</h1>
      <p>不具合報告、削除依頼、その他のご連絡はこちらからお願いします。</p>
      <form class="contactForm" onsubmit="event.preventDefault(); alert('お問い合わせ内容を受け付けました。'); this.reset();">
        <input type="text" name="name" placeholder="お名前">
        <input type="email" name="email" placeholder="メールアドレス">
        <textarea name="message" placeholder="お問い合わせ内容"></textarea>
        <button class="submitBtn" type="submit">送信する</button>
      </form>
    </article>
  </main>
</body>
</html>
