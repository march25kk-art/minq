<!DOCTYPE html>
<html lang="ja">
<head>

</head>
<body>
  <header>
    <div class="logo-container">
      <a class="logo" href="/">みんQ</a>
      <button class="topBtn" type="button" onclick="location.href='/'">⌂</button>
    </div>
  </header>
  <main class="staticPage">
    <article class="staticCard">
      <h1>プライバシーポリシー</h1>
      <p>みんQでは、サービス提供、荒らし対策、利用状況の把握のために必要な範囲で情報を取り扱います。</p>
      <h2>取得する情報</h2>
      <p>投稿内容、投票内容、コメント、アクセス情報、端末やブラウザに関する情報を取得する場合があります。</p>
      <h2>利用目的</h2>
      <p>サービスの提供、品質改善、不正利用の防止、問い合わせ対応のために利用します。</p>
      <h2>第三者提供</h2>
      <p>法令に基づく場合を除き、取得した情報を不必要に第三者へ提供することはありません。</p>
    </article>
  </main>
</body>
</html>
